<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>برامج التوثيق الرقمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #333333;
            color: #C5D330;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: clamp(24px, 6vw, 32px); 
            font-weight: 900;
            margin-bottom: 30px;
            text-align: center;
        }

        h2 {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 700;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 350px;
        }

        .app-btn {
            background-color: #C5D330;
            color: #222222;
            display: flex;
            align-items: center;
            padding: 6px;
            border-radius: 12px;
            text-decoration: none;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 900;
            direction: ltr;
            transition: transform 0.2s;
            height: 60px;
        }

        .app-btn:active {
            transform: scale(0.98);
        }

        /* حاوية الأيقونات البيضاء */
        .icon-box {
            background-color: #ffffff;
            border-radius: 8px;
            width: 48px;
            min-width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            overflow: hidden;
        }

        .icon-box img {
            width: 80%;
            height: 80%;
            object-fit: contain; 
        }

        /* تنسيق الشعارات السفلية */
        .footer-logos {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 350px;
            padding-top: 20px;
        }

        .footer-logos img {
            height: 35px;
            max-width: 22%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <h1>برامج التوثيق الرقمي</h1>

    <h2>للحاسوب</h2>
    <div class="buttons-container">
        <a href="https://www.realityscan.com/" class="app-btn" target="_blank">
            <div class="icon-box"><img src="realityscan_icon.png" alt="RealityScan"></div>
            REALITYSCAN
        </a>
        <a href="https://www.3dflow.net/3df-zephyr-photogrammetry-software/" class="app-btn" target="_blank">
            <div class="icon-box"><img src="3df_icon.png" alt="3DF"></div>
            3DF
        </a>
        <a href="https://www.agisoft.com/" class="app-btn" target="_blank">
            <div class="icon-box"><img src="metashape_icon.png" alt="Metashape"></div>
            Metashape
        </a>
        <a href="https://www.autodesk.com/products/3ds-max/overview" class="app-btn" target="_blank">
            <div class="icon-box"><img src="rr.png" alt="3D Max"></div>
            3D Max
        </a>
        <a href="https://www.blender.org/download/" class="app-btn" target="_blank">
            <div class="icon-box"><img src="ff.png" alt="Blender"></div>
            Blender
        </a>
        <a href="https://alicevision.org/view/meshroom.html" class="app-btn" target="_blank">
            <div class="icon-box"><img src="meshroom_icon.png" alt="Meshroom"></div>
            Meshroom
        </a>
    </div>

    <h2>للايفون</h2>
    <div class="buttons-container">
        <a href="https://apps.apple.com/us/app/polycam-3d-scans-floor-plans/id1532482376" class="app-btn" target="_blank">
            <div class="icon-box"><img src="polycam_icon.png" alt="Polycam"></div>
            Polycam 3D
        </a>
        <a href="https://apps.apple.com/us/app/realityscan-mobile/id1584832280?l=ar" class="app-btn" target="_blank">
            <div class="icon-box"><img src="realityscan_icon.png" alt="RealityScan"></div>
            RealityScan
        </a>
        <a href="https://apps.apple.com/iq/app/lightroom-photo-video-editor/id878783582?l=ar" class="app-btn" target="_blank">
            <div class="icon-box"><img src="lightroom_icon.png" alt="Lightroom"></div>
            Lightroom
        </a>
    </div>

    <h2>للاندرويد</h2>
    <div class="buttons-container">
        <a href="https://play.google.com/store/apps/details?id=ai.polycam&pcampaignid=web_share" class="app-btn" target="_blank">
            <div class="icon-box"><img src="polycam_icon.png" alt="Polycam"></div>
            Polycam 3D
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.epicgames.realityscan&pcampaignid=web_share" class="app-btn" target="_blank">
            <div class="icon-box"><img src="realityscan_icon.png" alt="RealityScan"></div>
            RealityScan
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.adobe.lrmobile&pcampaignid=web_share" class="app-btn" target="_blank">
            <div class="icon-box"><img src="lightroom_icon.png" alt="Lightroom"></div>
            Lightroom
        </a>
    </div>

    <div class="footer-logos">
        <img src="british_council_logo.png" alt="British Council">
        <img src="eu_logo.png" alt="EU">
        <img src="unesco_logo.png" alt="UNESCO">
        <img src="qaflab_logo.png" alt="Qaf Lab">
    </div>

</body>
</html>
